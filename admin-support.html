<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Management - RecuroAI Admin</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .admin-header {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }
        
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #6366f1;
        }
        
        .stat-label {
            color: #64748b;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }
        
        .support-requests {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .requests-header {
            padding: 1.5rem;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .filters {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .filter-select {
            padding: 0.5rem;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.875rem;
        }
        
        .request-item {
            padding: 1.5rem;
            border-bottom: 1px solid #f1f5f9;
            transition: background-color 0.2s;
        }
        
        .request-item:hover {
            background: #f8fafc;
        }
        
        .request-item.unread {
            background: #fef7cd;
            border-left: 4px solid #f59e0b;
        }
        
        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        
        .request-info h3 {
            font-size: 1.125rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.25rem;
        }
        
        .request-meta {
            font-size: 0.875rem;
            color: #64748b;
        }
        
        .request-status {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .status-open {
            background: #fef3c7;
            color: #92400e;
        }
        
        .status-resolved {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-in-progress {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .request-message {
            color: #4b5563;
            line-height: 1.6;
            margin-bottom: 1rem;
        }
        
        .request-actions {
            display: flex;
            gap: 0.75rem;
        }
        
        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-reply {
            background: #6366f1;
            color: white;
        }
        
        .btn-reply:hover {
            background: #4f46e5;
        }
        
        .btn-resolve {
            background: #10b981;
            color: white;
        }
        
        .btn-resolve:hover {
            background: #059669;
        }
        
        .btn-archive {
            background: #6b7280;
            color: white;
        }
        
        .btn-archive:hover {
            background: #4b5563;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #64748b;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        .loading {
            text-align: center;
            padding: 2rem;
            color: #64748b;
        }
        
        .reply-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .reply-modal.hidden {
            display: none;
        }
        
        .reply-content {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .reply-header {
            margin-bottom: 1.5rem;
        }
        
        .reply-form textarea {
            width: 100%;
            min-height: 150px;
            padding: 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            resize: vertical;
            margin-bottom: 1rem;
        }
        
        .reply-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>Support Management</h1>
            <p>Manage customer support requests and communications</p>
        </div>
        
        <div class="admin-stats" id="admin-stats">
            <!-- Stats will be loaded here -->
        </div>
        
        <div class="support-requests">
            <div class="requests-header">
                <h2>Support Requests</h2>
                <div class="filters">
                    <select class="filter-select" id="status-filter">
                        <option value="all">All Status</option>
                        <option value="open">Open</option>
                        <option value="in-progress">In Progress</option>
                        <option value="resolved">Resolved</option>
                    </select>
                    <select class="filter-select" id="time-filter">
                        <option value="all">All Time</option>
                        <option value="today">Today</option>
                        <option value="week">This Week</option>
                        <option value="month">This Month</option>
                    </select>
                    <button class="btn-small btn-reply" onclick="refreshRequests()">
                        <i data-feather="refresh-cw"></i> Refresh
                    </button>
                </div>
            </div>
            
            <div id="requests-container">
                <div class="loading">
                    <i data-feather="loader"></i>
                    <p>Loading support requests...</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Reply Modal -->
    <div class="reply-modal hidden" id="reply-modal">
        <div class="reply-content">
            <div class="reply-header">
                <h3>Reply to Support Request</h3>
                <p id="reply-to-info"></p>
            </div>
            <form class="reply-form" id="reply-form">
                <textarea placeholder="Type your response here..." required id="reply-message"></textarea>
                <div class="reply-actions">
                    <button type="button" class="btn-small btn-archive" onclick="closeReplyModal()">Cancel</button>
                    <button type="submit" class="btn-small btn-reply">Send Reply</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js"></script>
    <script>
        let currentRequests = [];
        let currentReplyId = null;
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            feather.replace();
            loadStats();
            loadRequests();
            
            // Add event listeners
            document.getElementById('status-filter').addEventListener('change', filterRequests);
            document.getElementById('time-filter').addEventListener('change', filterRequests);
            document.getElementById('reply-form').addEventListener('submit', sendReply);
        });
        
        async function loadStats() {
            try {
                const response = await fetch('/api/admin/support/stats');
                const data = await response.json();
                
                if (data.success) {
                    displayStats(data.stats);
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        function displayStats(stats) {
            const statsContainer = document.getElementById('admin-stats');
            statsContainer.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${stats.total || 0}</div>
                    <div class="stat-label">Total Requests</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.open || 0}</div>
                    <div class="stat-label">Open</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.inProgress || 0}</div>
                    <div class="stat-label">In Progress</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.resolved || 0}</div>
                    <div class="stat-label">Resolved</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.thisWeek || 0}</div>
                    <div class="stat-label">This Week</div>
                </div>
            `;
        }
        
        async function loadRequests() {
            try {
                const response = await fetch('/api/admin/support/requests');
                const data = await response.json();
                
                if (data.success) {
                    currentRequests = data.requests;
                    displayRequests(currentRequests);
                } else {
                    showError('Failed to load support requests');
                }
            } catch (error) {
                console.error('Error loading requests:', error);
                showError('Error loading support requests');
            }
        }
        
        function displayRequests(requests) {
            const container = document.getElementById('requests-container');
            
            if (!requests || requests.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i data-feather="inbox"></i>
                        <h3>No support requests</h3>
                        <p>No support requests found matching the current filters.</p>
                    </div>
                `;
                feather.replace();
                return;
            }
            
            container.innerHTML = requests.map(request => `
                <div class="request-item ${request.status === 'open' ? 'unread' : ''}" data-id="${request.id}">
                    <div class="request-header">
                        <div class="request-info">
                            <h3>${request.subject || 'General Inquiry'}</h3>
                            <div class="request-meta">
                                From: <strong>${request.name}</strong> (${request.email}) • 
                                ${formatDate(request.created_at)}
                            </div>
                        </div>
                        <span class="request-status status-${request.status}">
                            ${request.status.replace('-', ' ').toUpperCase()}
                        </span>
                    </div>
                    <div class="request-message">
                        ${request.message.length > 200 ? 
                            request.message.substring(0, 200) + '...' : 
                            request.message}
                    </div>
                    <div class="request-actions">
                        <button class="btn-small btn-reply" onclick="openReplyModal(${request.id})">
                            <i data-feather="mail"></i> Reply
                        </button>
                        ${request.status === 'open' ? 
                            `<button class="btn-small btn-resolve" onclick="updateStatus(${request.id}, 'in-progress')">
                                <i data-feather="clock"></i> In Progress
                            </button>` : ''
                        }
                        ${request.status !== 'resolved' ? 
                            `<button class="btn-small btn-resolve" onclick="updateStatus(${request.id}, 'resolved')">
                                <i data-feather="check"></i> Resolve
                            </button>` : ''
                        }
                        <button class="btn-small btn-archive" onclick="archiveRequest(${request.id})">
                            <i data-feather="archive"></i> Archive
                        </button>
                    </div>
                </div>
            `).join('');
            
            feather.replace();
        }
        
        function filterRequests() {
            const statusFilter = document.getElementById('status-filter').value;
            const timeFilter = document.getElementById('time-filter').value;
            
            let filtered = [...currentRequests];
            
            // Filter by status
            if (statusFilter !== 'all') {
                filtered = filtered.filter(req => req.status === statusFilter);
            }
            
            // Filter by time
            if (timeFilter !== 'all') {
                const now = new Date();
                const startDate = new Date();
                
                switch (timeFilter) {
                    case 'today':
                        startDate.setHours(0, 0, 0, 0);
                        break;
                    case 'week':
                        startDate.setDate(now.getDate() - 7);
                        break;
                    case 'month':
                        startDate.setMonth(now.getMonth() - 1);
                        break;
                }
                
                filtered = filtered.filter(req => new Date(req.created_at) >= startDate);
            }
            
            displayRequests(filtered);
        }
        
        async function updateStatus(requestId, newStatus) {
            try {
                const response = await fetch(`/api/admin/support/requests/${requestId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                
                const data = await response.json();
                if (data.success) {
                    await loadRequests();
                    await loadStats();
                } else {
                    showError('Failed to update status');
                }
            } catch (error) {
                console.error('Error updating status:', error);
                showError('Error updating status');
            }
        }
        
        function openReplyModal(requestId) {
            const request = currentRequests.find(r => r.id === requestId);
            if (!request) return;
            
            currentReplyId = requestId;
            document.getElementById('reply-to-info').textContent = 
                `Replying to: ${request.name} (${request.email}) - ${request.subject || 'General Inquiry'}`;
            document.getElementById('reply-modal').classList.remove('hidden');
            document.getElementById('reply-message').focus();
        }
        
        function closeReplyModal() {
            document.getElementById('reply-modal').classList.add('hidden');
            document.getElementById('reply-message').value = '';
            currentReplyId = null;
        }
        
        async function sendReply(event) {
            event.preventDefault();
            
            if (!currentReplyId) return;
            
            const message = document.getElementById('reply-message').value.trim();
            if (!message) return;
            
            try {
                const response = await fetch(`/api/admin/support/requests/${currentReplyId}/reply`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                
                const data = await response.json();
                if (data.success) {
                    closeReplyModal();
                    await updateStatus(currentReplyId, 'in-progress');
                    showSuccess('Reply sent successfully');
                } else {
                    showError('Failed to send reply');
                }
            } catch (error) {
                console.error('Error sending reply:', error);
                showError('Error sending reply');
            }
        }
        
        async function archiveRequest(requestId) {
            if (!confirm('Archive this support request?')) return;
            
            try {
                const response = await fetch(`/api/admin/support/requests/${requestId}/archive`, {
                    method: 'PUT'
                });
                
                const data = await response.json();
                if (data.success) {
                    await loadRequests();
                    await loadStats();
                } else {
                    showError('Failed to archive request');
                }
            } catch (error) {
                console.error('Error archiving request:', error);
                showError('Error archiving request');
            }
        }
        
        function refreshRequests() {
            loadRequests();
            loadStats();
        }
        
        function formatDate(dateString) {
            return new Date(dateString).toLocaleString();
        }
        
        function showError(message) {
            alert('Error: ' + message);
        }
        
        function showSuccess(message) {
            alert('Success: ' + message);
        }
    </script>
</body>
</html>
