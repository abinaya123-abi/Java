<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>நோய்க் கண்டறிதல்</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>பயிர் நோய்க் கண்டறிதல்</h1>
        <input type="file" id="imageUpload" accept="image/*">
        <button onclick="uploadImage()">படத்தை பதிவேற்று</button>
    </div>
    <script>
        function uploadImage() {
            alert("படம் வெற்றிகரமாக பதிவேற்றப்பட்டது! நோய் கண்டறியப்படுகிறது...");
        }
    </script>
</body>
</html>
